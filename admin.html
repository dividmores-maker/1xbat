<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دوري التسلية - لوحة الأدمن</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">لوحة الأدمن ⚙️</div>
  <div class="user-info">
    <a href="dashboard.html" class="btn btn-secondary btn-sm">الرئيسية</a>
    <span id="userName" style="font-size:14px; color:var(--text-secondary);"></span>
    <button class="btn-secondary btn-sm" onclick="handleLogout()">خروج</button>
  </div>
</div>

<div class="container">

  <div class="admin-panel">
    <div class="section-title">➕ إضافة ماتش جديد</div>
    <form id="addMatchForm" onsubmit="handleAddMatch(event)">
      <div class="form-row">
        <div class="form-group">
          <label>اللعبة</label>
          <select id="matchGame"></select>
        </div>
        <div class="form-group">
          <label>ملاحظات (اختياري)</label>
          <input type="text" id="matchNotes" placeholder="مثلاً: نص نهائي الدوري">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>اللاعب الأول</label>
          <input type="text" id="matchPlayer1" placeholder="اسم اللاعب الأول" required>
        </div>
        <div class="form-group">
          <label>اللاعب التاني</label>
          <input type="text" id="matchPlayer2" placeholder="اسم اللاعب التاني" required>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="addMatchBtn">إضافة الماتش</button>
    </form>
  </div>

  <div class="section-title">📋 إدارة الماتشات</div>
  <div id="adminMatchesContainer" class="matches-grid"></div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
  requireAdmin(async (user, userData) => {
    document.getElementById('userName').textContent = userData.name;
    populateGamesSelect();
    await loadAdminMatches();
  });
</script>

</body>
</html>
